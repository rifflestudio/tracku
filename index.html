<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tracku</title>
<style>
  /* ---------------------------------------------------------------
     tracku — rimu's calm front door to Linear.
     Vibe: hot pink field, bold black lowercase type, pixel cat,
     chunky pill cards. today = black · tomorrow = plum · backlog = outline
  ----------------------------------------------------------------*/
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FAF6EE;          /* soft eggshell — easy on the eyes */
    --pink: #FF50DC;        /* the pink lives on as the accent */
    --pink-soft: #ff9aec;
    --ink: #211d20;
    --plum: #7d4b72;
    --on-dark-muted: rgba(255,255,255,.62);
    --radius: 24px;
  }
  body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  #app { max-width: 940px; margin: 0 auto; padding: 24px 18px 80px; min-height: 100vh; }

  button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  .btn {
    border-radius: 999px; padding: 10px 18px; font-size: 14px; font-weight: 700;
  }
  .btn-primary { background: var(--pink); color: var(--ink); }
  .btn-primary:hover { background: var(--pink-soft); }

  /* ---- setup / connect screen ---- */
  .setup { text-align: center; padding-top: 70px; }
  .setup h1 { font-size: 46px; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px; }
  .setup p { font-weight: 500; margin-bottom: 8px; }
  .setup .box {
    max-width: 400px; margin: 28px auto 0; background: var(--ink); color: #fff;
    border-radius: 28px; padding: 26px; text-align: left;
  }
  .setup label { font-size: 13px; font-weight: 600; color: var(--on-dark-muted); display: block; margin-bottom: 6px; }
  .setup input, .setup select {
    width: 100%; padding: 10px 14px; font: inherit; font-size: 14px; color: #fff;
    border: none; border-radius: 999px; background: #383237; margin-bottom: 16px; outline: none;
  }
  .setup input::placeholder { color: rgba(255,255,255,.4); }
  .setup .keynote { font-size: 11px; color: rgba(255,255,255,.45); margin: -8px 0 16px; line-height: 1.5; }
  .setup .hint { margin-top: 16px; font-size: 12px; color: rgba(0,0,0,.5); }
  .setup .alt { margin-top: 14px; text-align: center; }
  .setup .alt button { font-size: 12px; color: var(--on-dark-muted); text-decoration: underline; }
  .setup .alt button:hover { color: #fff; }

  /* ---- loading ---- */
  .loading { text-align: center; padding-top: 150px; }
  .loading p { font-weight: 700; margin-top: 16px; }

  /* ---- home ---- */
  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 4px 2px 10px; }
  .avatars { display: flex; gap: 5px; }
  .top-actions { display: flex; gap: 16px; align-items: center; }
  .settings-link { font-size: 13px; font-weight: 600; color: rgba(0,0,0,.5); }
  .settings-link:hover { color: var(--ink); }

  .greeting { text-align: center; padding: 14px 0 30px; }
  .greeting h1 {
    font-size: clamp(25px, 4.6vw, 38px); font-weight: 800;
    letter-spacing: -0.8px; line-height: 1.12;
  }
  .greeting .tally { font-size: 13px; font-weight: 600; color: rgba(0,0,0,.55); margin-top: 12px; }
  .add-project { margin-top: 8px; min-height: 30px; display: flex; justify-content: center; align-items: center; }
  .add-project-link { font-size: 12px; font-weight: 600; color: rgba(0,0,0,.4); padding: 3px 10px; border-radius: 999px; }
  .add-project-link:hover { color: var(--ink); background: rgba(0,0,0,.06); }
  .project-form {
    margin: 10px auto 0; width: 330px; max-width: 88vw; background: var(--ink);
    border-radius: 24px; padding: 18px; text-align: left;
    display: flex; flex-direction: column; gap: 10px;
  }
  .project-form input, .project-form textarea, .project-form select {
    font: inherit; font-size: 13px; font-weight: 500; border: none; outline: none;
    background: #383237; color: #fff; border-radius: 999px; padding: 8px 14px; width: 100%;
    color-scheme: dark;
  }
  .project-form textarea { border-radius: 16px; min-height: 54px; resize: vertical; line-height: 1.45; }
  .project-form input::placeholder, .project-form textarea::placeholder { color: rgba(255,255,255,.4); }
  .pf-row { display: flex; align-items: center; gap: 10px; }
  .pf-label { font-size: 12px; font-weight: 600; color: var(--on-dark-muted); width: 46px; flex-shrink: 0; }
  .pf-actions { display: flex; gap: 10px; align-items: center; margin-top: 2px; }
  .pf-actions .btn { flex: 1; padding: 9px; font-size: 13px; }
  .pf-cancel { font-size: 12px; font-weight: 600; color: var(--on-dark-muted); }
  .pf-cancel:hover { color: #fff; }
  .cat { display: inline-block; margin-bottom: 14px; animation: bob 3.2s ease-in-out infinite; }
  .cat.jump { animation: jump .6s ease; }
  @keyframes bob { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-7px) } }
  @keyframes jump {
    0% { transform: translateY(0) rotate(0deg); }
    40% { transform: translateY(-30px) rotate(-7deg); }
    70% { transform: translateY(4px) rotate(2deg); }
    100% { transform: translateY(0) rotate(0deg); }
  }

  .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
  @media (max-width: 680px){ .columns { grid-template-columns: 1fr; } }

  .col-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; text-align: center; }
  .col-list { display: flex; flex-direction: column; gap: 12px; }

  /* ---- shipped ("you did it") ---- */
  .shipped-list { max-width: 560px; margin: 0 auto; }
  .ship-row {
    display: flex; align-items: center; gap: 12px; background: #fff;
    border: 1px solid rgba(0,0,0,.07); border-radius: 18px;
    padding: 12px 16px; margin-bottom: 10px;
  }
  .ship-tick {
    width: 21px; height: 21px; border-radius: 50%; background: var(--pink);
    color: var(--ink); font-weight: 800; font-size: 13px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .ship-title { font-size: 14px; font-weight: 600; flex: 1; }
  .ship-chip {
    font-size: 11px; font-weight: 600; color: rgba(0,0,0,.55);
    background: rgba(0,0,0,.07); border-radius: 999px; padding: 2px 9px;
  }
  .ship-date { font-size: 12px; font-weight: 600; color: rgba(0,0,0,.38); }

  /* ---- backlog shelf ---- */
  .backlog { margin-top: 34px; }
  .backlog-head {
    display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
    font-size: 15px; font-weight: 700; margin-bottom: 12px;
  }
  .backlog-head .count { font-weight: 500; color: rgba(0,0,0,.5); }
  .backlog-head .caret { transition: transform .15s; font-size: 12px; }
  .backlog-head.collapsed .caret { transform: rotate(-90deg); }
  .backlog-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 680px){ .backlog-list { grid-template-columns: 1fr; } }

  /* ---- cards: chunky pills ---- */
  .card {
    border-radius: var(--radius); padding: 14px 16px; cursor: pointer;
    transition: transform .12s ease;
  }
  .card:hover { transform: translateY(-2px); }
  .card.b-today { background: var(--ink); color: #fff; }
  .card.b-tomorrow { background: var(--plum); color: #fff; }
  .card.b-backlog { background: transparent; border: 2px solid rgba(0,0,0,.55); color: var(--ink); }
  .card.pending { opacity: .65; }
  .card.popping { animation: pop .42s ease forwards; }
  @keyframes pop {
    0% { transform: scale(1); }
    35% { transform: scale(1.05) rotate(1deg); }
    100% { transform: scale(.85); opacity: 0; }
  }

  .card-top { display: flex; gap: 11px; align-items: flex-start; }
  .card-title { font-size: 15px; font-weight: 600; }
  .tick {
    width: 21px; height: 21px; border-radius: 50%; border: 2px solid var(--pink);
    flex-shrink: 0; margin-top: 1px; cursor: pointer; background: transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: transparent; transition: background .1s;
  }
  .b-backlog .tick { border-color: var(--ink); }
  .tick:hover { background: var(--pink); color: var(--ink); }
  .b-backlog .tick:hover { background: var(--ink); color: var(--pink); }
  .tick.ticked { background: var(--pink); color: var(--ink); border-color: var(--pink); }

  .card-meta { display: flex; align-items: center; gap: 7px; margin: 10px 0 0 32px; flex-wrap: wrap; }
  .dot { width: 8px; height: 8px; border-radius: 2px; }
  .avatar {
    width: 20px; height: 20px; border-radius: 50%; font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; color: #fff;
  }
  .chip {
    font-size: 11px; font-weight: 600; color: rgba(255,255,255,.8);
    background: rgba(255,255,255,.14); border-radius: 999px; padding: 2px 9px;
  }
  .b-backlog .chip { color: rgba(0,0,0,.6); background: rgba(0,0,0,.08); }
  .paperclip { font-size: 11px; color: var(--on-dark-muted); }
  .b-backlog .paperclip { color: rgba(0,0,0,.45); }
  .moves { display: flex; gap: 2px; margin-left: auto; }
  .card-move { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.42); padding: 2px 6px; border-radius: 999px; }
  .card-move:hover { color: var(--ink); background: var(--pink); }
  .b-backlog .card-move { color: rgba(0,0,0,.42); }
  .b-backlog .card-move:hover { color: #fff; background: var(--ink); }

  .add-row {
    border: 2px dashed rgba(0,0,0,.4); border-radius: var(--radius); padding: 11px 15px;
    display: flex; align-items: center; gap: 9px;
  }
  .add-row input { flex: 1; border: none; background: none; font: inherit; font-size: 14px; font-weight: 500; outline: none; color: var(--ink); }
  .add-row input::placeholder { color: rgba(0,0,0,.42); }
  .add-plus { color: rgba(0,0,0,.5); font-size: 16px; font-weight: 700; }

  .empty {
    border: 2px dashed rgba(0,0,0,.3); border-radius: var(--radius); padding: 22px 14px;
    text-align: center; color: rgba(0,0,0,.5); font-size: 13px; font-weight: 500;
  }

  /* ---- detail panel ---- */
  .scrim {
    position: fixed; inset: 0; background: rgba(46,3,35,.5); opacity: 0; pointer-events: none;
    transition: opacity .18s; z-index: 20;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .panel {
    position: fixed; top: 0; right: 0; height: 100%; width: 410px; max-width: 92vw;
    background: var(--ink); color: #fff; z-index: 21; border-radius: 28px 0 0 28px;
    transform: translateX(100%); transition: transform .2s ease; overflow-y: auto; padding: 24px;
  }
  .panel.open { transform: translateX(0); }
  .panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .panel-id { font-size: 12px; color: var(--on-dark-muted); font-family: ui-monospace, monospace; }
  .panel-close { color: var(--on-dark-muted); font-size: 22px; line-height: 1; }
  .panel-close:hover { color: #fff; }
  .panel-title { display: flex; gap: 11px; align-items: flex-start; margin-bottom: 16px; }
  .panel-title .tick { width: 24px; height: 24px; margin-top: 3px; }
  .panel-title h2 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
  .panel-desc {
    font-size: 14px; color: rgba(255,255,255,.75); background: rgba(255,255,255,.08);
    border-radius: 16px; padding: 13px 15px; margin-bottom: 16px; white-space: pre-wrap;
    display: block; width: 100%; border: none; outline: none; resize: vertical;
    min-height: 74px; font-family: inherit; line-height: 1.5;
  }
  .panel-desc:focus { background: rgba(255,255,255,.12); }
  .panel-desc::placeholder { color: rgba(255,255,255,.4); }
  .prop { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; font-size: 13px; }
  .prop + .prop { border-top: 1px solid rgba(255,255,255,.1); }
  .prop .label { color: var(--on-dark-muted); font-weight: 600; }
  .prop select, .prop input[type=date] {
    font: inherit; font-size: 13px; font-weight: 600; border: none; border-radius: 999px;
    padding: 5px 12px; background: #383237; color: #fff; outline: none;
    color-scheme: dark;
  }
  .prop .chip { background: rgba(255,255,255,.14); color: rgba(255,255,255,.8); }
  .new-project { display: flex; gap: 6px; align-items: center; }
  .new-project-input {
    font: inherit; font-size: 13px; font-weight: 600; border: none; border-radius: 999px;
    padding: 5px 12px; background: #383237; color: #fff; outline: none; width: 170px;
  }
  .new-project-input::placeholder { color: rgba(255,255,255,.4); }
  .mini-x { color: var(--on-dark-muted); font-size: 16px; line-height: 1; padding: 0 2px; }
  .mini-x:hover { color: #fff; }

  .outputs { margin-top: 18px; border-top: 1px solid rgba(255,255,255,.1); padding-top: 14px; }
  .outputs h3, .comments h3 { font-size: 12px; color: var(--on-dark-muted); font-weight: 700; margin-bottom: 10px; letter-spacing: .3px; }
  .attach {
    display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 9px 12px;
    background: rgba(255,255,255,.07); border-radius: 14px; margin-bottom: 8px;
  }
  .attach .kind { font-size: 11px; font-weight: 700; color: var(--ink); background: var(--pink); border-radius: 999px; padding: 1px 8px; }
  .attach a { color: var(--pink-soft); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .attach-add input, .comment-add input {
    flex: 1; border: 2px dashed rgba(255,255,255,.25); border-radius: 999px; padding: 8px 14px;
    font: inherit; font-size: 13px; outline: none; background: none; color: #fff;
  }
  .attach-add input::placeholder, .comment-add input::placeholder { color: rgba(255,255,255,.4); }
  .attach-add, .comment-add { display: flex; gap: 6px; }
  .attach-note { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 6px; }

  .comments { margin-top: 18px; border-top: 1px solid rgba(255,255,255,.1); padding-top: 14px; }
  .comment { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 10px; font-size: 13px; }
  .comment .avatar { width: 20px; height: 20px; flex-shrink: 0; }
  .comment-add { margin-top: 10px; }
  .panel-done { width: 100%; margin-top: 22px; font-size: 15px; padding: 13px; }
  .status-pick { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
  .status-opt {
    font-size: 13px; font-weight: 600; border-radius: 999px; padding: 7px 14px;
    background: #383237; color: #fff; border: 2px solid transparent;
  }
  .status-opt:hover { background: var(--pink); color: var(--ink); }
  .status-opt.current { border-color: var(--pink); }
  .open-linear { font-size: 12px; color: var(--on-dark-muted); text-decoration: underline; }
  .open-linear:hover { color: var(--pink-soft); }
  .none-yet { font-size: 13px; color: rgba(255,255,255,.4); margin-bottom: 10px; }

  /* ---- celebration ---- */
  .cheer {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    z-index: 40; pointer-events: none; opacity: 0; transition: opacity .15s;
  }
  .cheer.show { opacity: 1; }
  .cheer .bubble {
    background: var(--ink); color: var(--pink); padding: 15px 26px; border-radius: 999px;
    font-size: 17px; font-weight: 800; transform: scale(.8); transition: transform .2s;
  }
  .cheer.show .bubble { transform: scale(1); }

  /* ---- toast (gentle error) ---- */
  .toast {
    position: fixed; bottom: 26px; left: 50%; z-index: 50; pointer-events: none;
    transform: translateX(-50%) translateY(90px); opacity: 0;
    background: var(--ink); color: #fff; padding: 11px 20px; border-radius: 999px;
    font-size: 13px; font-weight: 600; transition: transform .22s ease, opacity .22s;
    max-width: 88vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  .hidden { display: none !important; }
  .footnote { text-align: center; color: rgba(0,0,0,.45); font-size: 11px; font-weight: 500; margin-top: 34px; line-height: 1.7; }
  .footnote button { text-decoration: underline; }
</style>
</head>
<body>
  <div id="app"></div>
  <div class="scrim" id="scrim"></div>
  <div class="panel" id="panel"></div>
  <div class="cheer" id="cheer"><div class="bubble" id="cheerText">✦ nice, shipped it</div></div>
  <div class="toast" id="toast"></div>

<script>
/* =====================================================================
   tracku — Linear is the source of truth for issue content.
   The local layer (buckets, backlog collapse, weekly tally) is the
   vibe layer, keyed by Linear issue id. Linear never sees it.

   Modes:
   - "linear": real sync via Linear GraphQL (personal API key)
   - "demo":   fake data, writes stay in the browser
   ===================================================================== */

/* ---------------- storage ---------------- */
const CFG_KEY   = "tracku-linear"; // { key, teamId, teamName } — stays on this device
const LOCAL_KEY = "tracku-local";  // vibe layer: { buckets, backlogOpen, week, shipped, mode }
const DEMO_KEY  = "tracku-demo";   // demo-mode issue data

// some embedded browsers disable localStorage entirely — fall back to
// in-memory storage so tracku still works (it just forgets on refresh)
const store = (() => {
  try {
    const ls = window.localStorage;
    ls.setItem("__tracku_test","1"); ls.removeItem("__tracku_test");
    return { getItem: k=>ls.getItem(k), setItem: (k,v)=>ls.setItem(k,v), removeItem: k=>ls.removeItem(k), memory: false };
  } catch(e) {
    const m = {};
    return { getItem: k=>(k in m ? m[k] : null), setItem: (k,v)=>{ m[k]=String(v); }, removeItem: k=>{ delete m[k]; }, memory: true };
  }
})();

function loadJSON(k, fallback){
  try { const raw = store.getItem(k); return raw ? JSON.parse(raw) : fallback; }
  catch(e){ return fallback; }
}
// Monday of the current week — the tally resets when this changes
function weekKey(){
  const d = new Date(); const day = (d.getDay()+6)%7;
  d.setDate(d.getDate()-day);
  return d.toISOString().slice(0,10);
}

let cfg = loadJSON(CFG_KEY, null);
let local = loadJSON(LOCAL_KEY, { buckets: {}, backlogOpen: false, week: weekKey(), shipped: 0, mode: null });
if(local.week !== weekKey()){ local.week = weekKey(); local.shipped = 0; }
function saveLocal(){ store.setItem(LOCAL_KEY, JSON.stringify(local)); }

/* ---------------- state ---------------- */
let state = {
  screen: "setup",       // setup | loading | home
  mode: null,            // "linear" | "demo"
  syncing: false,
  selectedId: null,
  setupTeams: null,      // teams list during setup step 2
  setupKey: null,        // key being validated during setup
  meId: null,
  people: {},            // id -> { name, initial, color }
  stateIds: {},          // "todo" | "in progress" | "done" -> Linear workflow state id
  projects: [],          // [{ id, name }] for the team
  newProjectFor: null,   // issue id currently typing a new project name for
  shippedList: null,     // completed issues fetched for the "you did it" view
  issues: [],
};

const AVATAR_COLORS = ["#c0398f","#2f8f5b","#b8791a","#3b6fb8","#8a4bd1","#d1584b","#3f8f8a"];
const PRIORITY_DOT = { urgent: "#ff5c5c", high: "#ffb03a", none: "transparent" };

/* ---------------- Linear API ---------------- */
const LINEAR_URL = "https://api.linear.app/graphql";
async function gql(query, variables, keyOverride){
  const res = await fetch(LINEAR_URL, {
    method: "POST",
    headers: { "content-type": "application/json", authorization: keyOverride || cfg.key },
    body: JSON.stringify({ query, variables: variables || {} }),
  });
  const json = await res.json().catch(()=>({ errors:[{message:"bad response"}] }));
  if(!res.ok || json.errors) throw new Error((json.errors && json.errors[0].message) || ("http " + res.status));
  return json.data;
}
// fire-and-forget write: optimistic UI already applied; on failure, tell rimu and re-sync truth
function linWrite(query, variables){
  if(state.mode !== "linear") { saveDemo(); return; }
  gql(query, variables).catch(e => { toast("couldn't reach linear — " + e.message); sync(); });
}

const SYNC_QUERY = `query($teamId: String!) {
  viewer { id }
  team(id: $teamId) {
    states { nodes { id name type position } }
    members { nodes { id displayName } }
    projects(first: 100) { nodes { id name } }
    issues(first: 100, orderBy: updatedAt, filter: {
      state: { type: { nin: ["completed","canceled"] } },
      assignee: { isMe: { eq: true } }
    }) {
      nodes {
        id identifier title description priority dueDate url
        state { id name type }
        assignee { id }
        project { id name }
        attachments { nodes { id title url } }
        comments(first: 25) { nodes { id body user { id displayName } } }
      }
    }
  }
}`;

function statusFromType(t){ return t==="completed" ? "done" : t==="started" ? "in progress" : "todo"; }
function kindFromUrl(url){
  if(/figma/i.test(url)) return "figma";
  if(/docs\.google|gdoc/i.test(url)) return "doc";
  if(/drive\.google/i.test(url)) return "drive";
  if(/notion/i.test(url)) return "notion";
  return "link";
}

async function sync(){
  if(state.syncing) return;
  state.syncing = true;
  if(state.screen !== "home") { state.screen = "loading"; render(); } else render();
  try {
    const data = await gql(SYNC_QUERY, { teamId: cfg.teamId });
    state.meId = data.viewer.id;

    state.people = {};
    data.team.members.nodes.forEach((m, idx) => {
      state.people[m.id] = { name: m.displayName, initial: (m.displayName[0]||"?").toUpperCase(), color: AVATAR_COLORS[idx % AVATAR_COLORS.length] };
    });

    // the team's full workflow, in board order — powers the status picker
    state.allStates = data.team.states.nodes
      .sort((a,b)=>a.position-b.position)
      .map(s => ({ id: s.id, name: s.name, type: s.type }));

    // lowest-position workflow state of each type becomes our target for quick writes
    const byType = {};
    state.allStates.forEach(s => { if(!byType[s.type]) byType[s.type] = s.id; });
    state.stateIds = {
      "todo": byType.unstarted || byType.backlog,
      "in progress": byType.started,
      "done": byType.completed,
    };

    state.projects = data.team.projects.nodes.map(p => ({ id: p.id, name: p.name }));

    state.issues = data.team.issues.nodes.map(n => ({
      id: n.id, identifier: n.identifier,
      title: n.title, description: n.description || "",
      status: statusFromType(n.state.type),
      stateId: n.state.id, stateName: n.state.name,
      assignee: n.assignee ? n.assignee.id : "",
      priority: n.priority === 1 ? "urgent" : n.priority === 2 ? "high" : "none",
      due: n.dueDate || "",
      project: n.project ? n.project.name : "", projectId: n.project ? n.project.id : "",
      url: n.url,
      attachments: n.attachments.nodes.map(a => ({ kind: kindFromUrl(a.url), name: a.title || a.url, url: a.url })),

      done: false,
    }));

    state.screen = "home";
  } catch(e) {
    toast("sync failed — " + e.message);
    if(state.screen === "loading") state.screen = "setup";
  }
  state.syncing = false;
  render();
}

/* ---------------- the pixel cat ----------------------------------
   x = black pixel, e = eye (pink shows through).
   Swap this map for rimu's own cat art any time.
------------------------------------------------------------------- */
const CAT_MAP = [
  "..x.......x...x..",
  "..xx......xx..xx.",
  "...xx.....xxxxxx.",
  "...xx....xxxxxxx.",
  "....xx...xexxxex.",
  "....xxxxxxxxxxxx.",
  "...xxxxxxxxxxxxx.",
  "..xxxxxxxxxxxxx..",
  ".xxxxxxxxxxxxxx..",
  ".xxxxxxxxxxxxx...",
  ".xx..xxxx..xxx...",
  ".x...xx.....xx...",
  "......x......xx..",
];
function catSVG(px){
  px = px || 6;
  const w = CAT_MAP[0].length, h = CAT_MAP.length;
  let rects = "";
  CAT_MAP.forEach((row, y) => {
    [...row].forEach((c, x) => {
      if(c === "x") rects += `<rect x="${x*px}" y="${y*px}" width="${px}" height="${px}"/>`;
    });
  });
  return `<svg width="${w*px}" height="${h*px}" viewBox="0 0 ${w*px} ${h*px}"
    xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" fill="#141114">${rects}</svg>`;
}

/* ---------------- undo (ctrl/cmd + z) ----------------
   every action pushes its inverse onto a stack. the inverse is a plain
   closure that restores local state and fires the reverse Linear write. */
const undoStack = [];
function pushUndo(label, fn){
  undoStack.push({ label, fn });
  if(undoStack.length > 50) undoStack.shift();
}
function undo(){
  const entry = undoStack.pop();
  if(!entry) return toast("nothing to undo");
  entry.fn();
  toast("↩ undid — " + entry.label);
}
document.addEventListener("keydown", e => {
  if((e.metaKey || e.ctrlKey) && !e.shiftKey && e.key.toLowerCase() === "z"){
    const t = e.target;
    // inside a text field, leave ctrl+z to the browser's native text undo
    if(t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable)) return;
    e.preventDefault();
    undo();
  }
});

/* ---------------- interactions ---------------- */
function tickDone(id){
  const i = state.issues.find(x=>x.id===id); if(!i || i.done || i.ticking || i.pending) return;
  i.ticking = true;
  const prevStatus = i.status, prevBucket = i.bucket;
  const prevStateId = i.stateId, prevStateName = i.stateName;
  if(state.selectedId===id){ closePanel(); }
  // let the tick fill + the card pop before it leaves the board
  const el = document.querySelector(`.card[data-id="${id}"]`);
  if(el){
    el.classList.add("popping");
    const t = el.querySelector(".tick"); if(t) t.classList.add("ticked");
  }
  setTimeout(()=>{
    i.done = true; i.status = "done";
    i.stateId = state.stateIds["done"];
    i.stateName = ((state.allStates||[]).find(s=>s.id===i.stateId)||{}).name || "Done";
    i.completedAt = new Date().toISOString();
    local.shipped++; saveLocal();
    linWrite(`mutation($id: String!, $stateId: String!) {
      issueUpdate(id: $id, input: { stateId: $stateId }) { success }
    }`, { id, stateId: state.stateIds["done"] });
    pushUndo(`"${i.title}" is back`, () => {
      i.done = false; i.ticking = false; i.status = prevStatus; delete i.completedAt;
      i.stateId = prevStateId; i.stateName = prevStateName;
      i.bucket = prevBucket; local.buckets[i.id] = prevBucket;
      local.shipped = Math.max(0, local.shipped - 1); saveLocal();
      linWrite(`mutation($id: String!, $stateId: String!) {
        issueUpdate(id: $id, input: { stateId: $stateId }) { success }
      }`, { id: i.id, stateId: prevStateId || state.stateIds[prevStatus] });
      render();
    });
    render();
    showCheer();
  }, el ? 420 : 0);
}
function moveBucket(id, bucket, isUndo){
  const i = state.issues.find(x=>x.id===id); if(!i || i.bucket === bucket) return;
  const prev = i.bucket;
  if(!isUndo) pushUndo(`"${i.title}" → ${prev}`, () => moveBucket(id, prev, true));
  i.bucket = bucket;                       // vibe layer only — linear never sees buckets
  local.buckets[id] = bucket; saveLocal();
  render();
}
function addCard(bucket, el){
  const val = el.value.trim(); if(!val) return;
  const tempId = "tmp-" + Date.now();
  const card = {
    id: tempId, identifier: "…",
    title: val, description: "", status: "todo",
    stateId: state.stateIds["todo"] || "",
    stateName: ((state.allStates||[]).find(s=>s.id===state.stateIds["todo"])||{}).name || "Todo",
    assignee: state.meId,
    priority: "none", due: "", project: "", projectId: "", url: "", attachments: [], comments: [],
    bucket, done: false, pending: state.mode === "linear",
  };
  state.issues.push(card);
  local.buckets[tempId] = bucket; saveLocal();
  pushUndo(`added "${val}"`, () => {
    state.issues = state.issues.filter(x => x !== card);
    delete local.buckets[card.id]; saveLocal();
    if(state.mode === "linear" && !card.pending){
      linWrite(`mutation($id: String!) { issueArchive(id: $id) { success } }`, { id: card.id });
    } else { saveDemo(); }
    render();
  });
  el.value = "";
  render();
  const again = document.querySelector(`.add-row input[data-bucket="${bucket}"]`);
  if(again) again.focus();

  if(state.mode === "linear"){
    gql(`mutation($input: IssueCreateInput!) {
      issueCreate(input: $input) { success issue { id identifier url } }
    }`, { input: { teamId: cfg.teamId, title: val, assigneeId: state.meId } })
    .then(d => {
      const iss = d.issueCreate.issue;
      card.id = iss.id; card.identifier = iss.identifier; card.url = iss.url; card.pending = false;
      delete local.buckets[tempId]; local.buckets[iss.id] = card.bucket; saveLocal();
      render();
    })
    .catch(e => {
      state.issues = state.issues.filter(x => x.id !== tempId);
      delete local.buckets[tempId]; saveLocal();
      toast("couldn't create it in linear — " + e.message);
      render();
    });
  } else {
    demo.nextNum++;
    card.identifier = "ENG-" + demo.nextNum;
    saveDemo(); render();
  }
}

  if(!i){ panel.innerHTML=""; return; }
  const openLink = i.url
    ? `<a class="open-linear" href="${esc(i.url)}" target="_blank" rel="noopener">open in linear ↗</a>`
    : `<a class="open-linear" href="#" onclick="event.preventDefault()">demo card</a>`;
  panel.innerHTML = `
    <div class="panel-head">
      <span class="panel-id">${esc(i.identifier)}</span>
      <div style="display:flex;gap:12px;align-items:center">
        ${openLink}
        <button class="panel-close" onclick="closePanel()">×</button>
      </div>
    </div>
    <div class="panel-title">
      <button class="tick" aria-label="mark done" onclick="tickDone('${i.id}')">✓</button>
      <h2>${esc(i.title)}</h2>
    </div>
    <textarea class="panel-desc" placeholder="add a description…"
      onblur="setDescription('${i.id}',this.value)">${esc(i.description)}</textarea>

    <div class="prop">
      <span class="label">status</span>
      <select onchange="setState('${i.id}',this.value)">
        ${(state.allStates||[]).map(s=>`<option value="${esc(s.id)}" ${s.id===i.stateId?"selected":""}>${esc(s.name.toLowerCase())}</option>`).join("")}
      </select>
    </div>
    <div class="prop">
      <span class="label">who</span>
      <select onchange="setAssignee('${i.id}',this.value)">
        <option value="" ${!i.assignee?"selected":""}>nobody</option>
        ${Object.keys(state.people).map(k=>`<option value="${esc(k)}" ${k===i.assignee?"selected":""}>${esc(state.people[k].name)}</option>`).join("")}
      </select>
    </div>
    <div class="prop">
      <span class="label">when</span>
      <input type="date" value="${i.due}" onchange="setDue('${i.id}',this.value)" />
    </div>
    <div class="prop">
      <span class="label">bucket</span>
      <select onchange="moveBucket('${i.id}',this.value)">
        ${["today","tomorrow","backlog"].map(b=>`<option ${b===i.bucket?"selected":""}>${b}</option>`).join("")}
      </select>
    </div>
    ${projectPropHTML(i)}

    <div class="outputs">
      <h3>outputs</h3>
      ${i.attachments.map((a)=>`
        <div class="attach">
          <span class="kind">${esc(a.kind)}</span>
          <a href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.name)}</a>
        </div>`).join("") || `<div class="none-yet">no outputs yet</div>`}
      <div class="attach-add">
        <input placeholder="paste a figma / doc / drive link…" onkeydown="if(event.key==='Enter')addAttachment('${i.id}',this)" />
      </div>
      <div class="attach-note">links attach straight to the linear issue</div>
    </div>

    <div class="comments">
      <h3>comments</h3>
      ${i.comments.map(c=>`<div class="comment">${avatarHTML(c.who)}<span>${esc(c.text)}</span></div>`).join("") || `<div class="none-yet">no comments yet</div>`}
      <div class="comment-add">
        <input placeholder="add a comment…" onkeydown="if(event.key==='Enter')addComment('${i.id}',this)" />
      </div>
    </div>

    ${state.statusPickerOpen ? `
      <div class="status-pick">
        ${(state.allStates||[]).map(s=>`
          <button class="status-opt ${s.id===i.stateId?"current":""}" onclick="setState('${i.id}','${esc(s.id)}')">
            ${esc(s.name.toLowerCase())}${s.type==="completed"?" ✓":""}
          </button>`).join("")}
      </div>` : ""}
    <button class="btn btn-primary panel-done" onclick="state.statusPickerOpen=!state.statusPickerOpen;renderPanel()">
      change da status ${state.statusPickerOpen ? "▴" : "✦"}
    </button>`;

  if(state.newProjectFor === i.id){
    const inp = panel.querySelector(".new-project-input");
    if(inp) inp.focus();
  }
}

/* "+ add project" on the home screen — a small creator with optional metadata */
function projectFormHTML(){
  return `
    <div class="project-form">
      <input id="pfName" placeholder="project name…"
        onkeydown="if(event.key==='Enter')submitProjectForm();else if(event.key==='Escape'){state.addingProject=false;render();}" />
      <textarea id="pfDesc" placeholder="what's it about? (optional)"></textarea>
      <div class="pf-row"><span class="pf-label">target</span><input type="date" id="pfDate" /></div>
      <div class="pf-row"><span class="pf-label">lead</span>
        <select id="pfLead">
          <option value="">nobody</option>
          ${Object.keys(state.people).map(k=>`<option value="${esc(k)}" ${k===state.meId?"selected":""}>${esc(state.people[k].name)}</option>`).join("")}
        </select>
      </div>
      <div class="pf-actions">
        <button class="btn btn-primary" onclick="submitProjectForm()">create ✦</button>
        <button class="pf-cancel" onclick="state.addingProject=false;render()">cancel</button>
      </div>
    </div>`;
}
function submitProjectForm(){
  const name = (document.getElementById("pfName").value||"").trim();
  if(!name) return toast("give it a name first");
  if(state.projects.some(p => p.name.toLowerCase() === name.toLowerCase())){
    return toast(`"${name}" already exists`);
  }
  const desc = (document.getElementById("pfDesc").value||"").trim();
  const date = document.getElementById("pfDate").value;
  const lead = document.getElementById("pfLead").value;
  state.addingProject = false;

  if(state.mode === "linear"){
    const input = { name, teamIds: [cfg.teamId] };
    if(desc) input.description = desc;
    if(date) input.targetDate = date;
    if(lead) input.leadId = lead;
    gql(`mutation($input: ProjectCreateInput!) {
      projectCreate(input: $input) { success project { id name } }
    }`, { input })
    .then(d => {
      const p = d.projectCreate.project;
      state.projects.push({ id: p.id, name: p.name });
      toast(`✦ project "${p.name}" created`);
      render();
    })
    .catch(e => { toast("couldn't create project — " + e.message); render(); });
    render();
  } else {
    state.projects.push({ id: name, name });
    toast(`✦ project "${name}" created`);
    saveDemo(); render();
  }
}

/* project field: pick an existing project, clear it, or make a new one */
function projectPropHTML(i){
  if(state.newProjectFor === i.id){
    return `
    <div class="prop">
      <span class="label">project</span>
      <span class="new-project">
        <input class="new-project-input" placeholder="new project name…"
          onkeydown="if(event.key==='Enter')createProject('${i.id}',this);else if(event.key==='Escape'){state.newProjectFor=null;renderPanel();}" />
        <button class="mini-x" onclick="state.newProjectFor=null;renderPanel()">×</button>
      </span>
    </div>`;
  }
  return `
    <div class="prop">
      <span class="label">project</span>
      <select onchange="onProjectPick('${i.id}',this.value)">
        <option value="" ${!i.projectId?"selected":""}>none</option>
        ${state.projects.map(p=>`<option value="${esc(p.id)}" ${p.id===i.projectId?"selected":""}>${esc(p.name)}</option>`).join("")}
        <option value="__new__">＋ new project…</option>
      </select>
    </div>`;
}
function onProjectPick(id, val){
  if(val === "__new__"){ state.newProjectFor = id; renderPanel(); return; }
  setProject(id, val);
}
function setProject(id, projectId, isUndo){
  const i = state.issues.find(x=>x.id===id); if(!i || i.projectId === (projectId||"")) return;
  const p = state.projects.find(p=>p.id===projectId);
  const prev = i.projectId;
  if(!isUndo) pushUndo(`project on "${i.title}"`, () => setProject(id, prev, true));
  i.projectId = projectId || "";
  i.project = p ? p.name : "";
  state.newProjectFor = null;
  linWrite(`mutation($id: String!, $projectId: String) {
    issueUpdate(id: $id, input: { projectId: $projectId }) { success }
  }`, { id, projectId: projectId || null });
  render();
}
function createProject(id, el){
  const name = (el.value||"").trim(); if(!name) return;
  const i = state.issues.find(x=>x.id===id); if(!i) return;
  state.newProjectFor = null;

  if(state.mode === "linear"){
    i.project = name; i.projectId = "pending";   // optimistic
    render();
    gql(`mutation($input: ProjectCreateInput!) {
      projectCreate(input: $input) { success project { id name } }
    }`, { input: { name, teamIds: [cfg.teamId] } })
    .then(d => {
      const p = d.projectCreate.project;
      state.projects.push({ id: p.id, name: p.name });
      i.projectId = p.id; i.project = p.name;
      return gql(`mutation($id: String!, $projectId: String!) {
        issueUpdate(id: $id, input: { projectId: $projectId }) { success }
      }`, { id, projectId: p.id });
    })
    .then(()=>render())
    .catch(e => { toast("couldn't create project — " + e.message); i.project=""; i.projectId=""; render(); });
  } else {
    // demo: id === name
    if(!state.projects.some(p=>p.id===name)) state.projects.push({ id: name, name });
    i.projectId = name; i.project = name;
    saveDemo(); render();
  }
}

function setDescription(id,v,isUndo){
  const i=state.issues.find(x=>x.id===id); if(!i) return;
  const val = (v||"").trim();
  if(val === i.description) return;   // nothing changed — no write
  const prev = i.description;
  if(!isUndo) pushUndo(`description on "${i.title}"`, () => setDescription(id, prev, true));
  i.description = val;
  linWrite(`mutation($id: String!, $description: String) {
    issueUpdate(id: $id, input: { description: $description }) { success }
  }`, { id, description: val || null });
  saveDemo();
  if(isUndo) renderPanel();
}
/* send the issue to any of the team's real workflow states.
   completed-type → full tick celebration · canceled-type → quietly leaves the board */
function setState(id, stateId, isUndo){
  const i = state.issues.find(x=>x.id===id); if(!i || i.stateId === stateId) return;
  const st = (state.allStates||[]).find(s=>s.id===stateId); if(!st) return;
  const prev = { stateId: i.stateId, stateName: i.stateName, status: i.status,
                 done: i.done, canceled: !!i.canceled, completedAt: i.completedAt, shipped: local.shipped };
  if(!isUndo) pushUndo(`status on "${i.title}"`, () => {
    i.stateId = prev.stateId; i.stateName = prev.stateName; i.status = prev.status;
    i.done = prev.done; i.canceled = prev.canceled; i.ticking = false;
    if(prev.completedAt) i.completedAt = prev.completedAt; else delete i.completedAt;
    local.shipped = prev.shipped; saveLocal();
    linWrite(`mutation($id: String!, $stateId: String!) {
      issueUpdate(id: $id, input: { stateId: $stateId }) { success }
    }`, { id: i.id, stateId: prev.stateId });
    render();
  });
  i.stateId = st.id; i.stateName = st.name; i.status = statusFromType(st.type);
  if(st.type === "completed"){
    if(!i.done){ i.done = true; i.completedAt = new Date().toISOString(); local.shipped++; saveLocal(); showCheer(); }
    i.canceled = false;
    if(state.selectedId===id) closePanel();
  } else if(st.type === "canceled"){
    i.canceled = true; i.done = false; i.ticking = false; delete i.completedAt;
    if(state.selectedId===id) closePanel();
  } else {
    i.done = false; i.canceled = false; i.ticking = false; delete i.completedAt;
  }
  linWrite(`mutation($id: String!, $stateId: String!) {
    issueUpdate(id: $id, input: { stateId: $stateId }) { success }
  }`, { id, stateId });
  state.statusPickerOpen = false;
  render();
}
function setAssignee(id,v,isUndo){
  const i=state.issues.find(x=>x.id===id); if(!i || i.assignee===v) return;
  const prev = i.assignee;
  if(!isUndo) pushUndo(`who on "${i.title}"`, () => setAssignee(id, prev, true));
  i.assignee=v;
  linWrite(`mutation($id: String!, $assigneeId: String) {
    issueUpdate(id: $id, input: { assigneeId: $assigneeId }) { success }
  }`, { id, assigneeId: v || null });
  render();
}
function setDue(id,v,isUndo){
  const i=state.issues.find(x=>x.id===id); if(!i || i.due===v) return;
  const prev = i.due;
  if(!isUndo) pushUndo(`date on "${i.title}"`, () => setDue(id, prev, true));
  i.due=v;
  linWrite(`mutation($id: String!, $dueDate: TimelessDate) {
    issueUpdate(id: $id, input: { dueDate: $dueDate }) { success }
  }`, { id, dueDate: v || null });
  render();
}
function addAttachment(id,el){
  const url=el.value.trim(); if(!url) return;
  const i=state.issues.find(x=>x.id===id); if(!i) return;
  const name = url.replace(/^https?:\/\//,"").slice(0,40);
  i.attachments.push({ kind: kindFromUrl(url), name, url });
  linWrite(`mutation($input: AttachmentCreateInput!) {
    attachmentCreate(input: $input) { success }
  }`, { input: { issueId: id, title: name, url } });
  el.value=""; renderPanel();
}
function addComment(id,el){
  const val=el.value.trim(); if(!val) return;
  const i=state.issues.find(x=>x.id===id); if(!i) return;
  i.comments.push({ who: state.meId, text: val });
  linWrite(`mutation($input: CommentCreateInput!) {
    commentCreate(input: $input) { success }
  }`, { input: { issueId: id, body: val } });
  el.value=""; renderPanel();
}

/* ---------------- FRAME: celebration ---------------- */
function showCheer(){
  const lines=["✦ nice, shipped it","✦ boom, done","✦ one down","✦ look at you go"];
  cheerText.textContent = lines[Math.floor(Math.random()*lines.length)];
  cheer.classList.add("show");
  setTimeout(()=>cheer.classList.remove("show"), 1100);
  const cat = document.getElementById("cat");
  if(cat){ cat.classList.add("jump"); setTimeout(()=>cat.classList.remove("jump"), 650); }
}

boot();
</script>
